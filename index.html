<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carry Romero | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .font-mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased">

    <div class="fixed inset-0 z-[-1] bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:40px_40px] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_70%,transparent_100%)] hidden dark:block"></div>

    <header class="fixed w-full bg-white/80 dark:bg-slate-950/80 backdrop-blur-md z-50 border-b border-slate-200 dark:border-slate-800 transition-colors">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-bold text-xl tracking-tight dark:text-cyan-400 font-mono italic">
                &lt;CR /&gt;
            </div>
            
            <div class="flex items-center gap-6">
                <ul class="hidden md:flex space-x-8 font-medium text-sm text-slate-600 dark:text-slate-400">
                    <li><a href="#home" class="hover:text-blue-600 dark:hover:text-cyan-400 transition">Home</a></li>
                    <li><a href="#about" class="hover:text-blue-600 dark:hover:text-cyan-400 transition">About</a></li>
                    <li><a href="#projects" class="hover:text-blue-600 dark:hover:text-cyan-400 transition">Projects</a></li>
                </ul>

                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:ring-2 ring-blue-400 dark:ring-cyan-400 transition-all outline-none">
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-cyan-400" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                </button>
            </div>
        </nav>
    </header>

    <main class="pt-48">
        <section id="home" class="pb-20 px-6 max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-16">
            
            <div class="shrink-0 relative">
                <div class="absolute -top-4 -right-4 z-30 bg-white dark:bg-slate-900 border border-slate-200 dark:border-cyan-500/50 px-4 py-2 rounded-full shadow-xl">
                    <div class="flex items-center gap-2">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-cyan-400 font-mono">Status: Online</span>
                    </div>
                </div>

                <div class="relative w-72 h-72 md:w-96 md:h-96 grid grid-cols-1 grid-rows-1 overflow-hidden rounded-2xl shadow-2xl border-4 border-white dark:border-slate-800">
                    
                    <img src="images/grdpic1.jfif" alt="Carry Romero" 
                         class="col-start-1 row-start-1 w-full h-full object-cover dark:hidden">

                    <video src="images/NoCapTOwithCAP.mp4" 
                           class="col-start-1 row-start-1 w-full h-full object-cover hidden dark:block" 
                           autoplay loop muted playsinline></video>

                    <img src="images/toga_cap.png" alt="Graduation Cap" 
                         class="col-start-1 row-start-1 w-full h-full object-contain z-20 pointer-events-none hidden dark:block transition-transform duration-700 delay-100 scale-110 animate-fade-in">
                </div>
            </div>

            <div class="flex-1">
                <div class="inline-block px-3 py-1 rounded bg-blue-100 dark:bg-cyan-500/10 text-blue-700 dark:text-cyan-400 text-xs font-mono font-bold mb-4">
                    &gt; Initializing Portfolio...
                </div>
                <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6 leading-tight">
                    Hi, I'm <span class="text-blue-600 dark:text-cyan-400">Carry Romero</span>
                </h1>
                <p class="text-xl text-slate-600 dark:text-slate-400 max-w-xl mb-10 leading-relaxed">
                    I’m a fresh IT graduate specializing in <span class="text-slate-900 dark:text-white font-semibold">Full-Stack Development</span>. I turn complex logic into clean, responsive user interfaces that actually work for people.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="#projects" class="bg-blue-600 dark:bg-cyan-500 dark:text-slate-950 px-8 py-4 rounded-xl font-bold hover:shadow-lg dark:hover:shadow-cyan-500/20 transition-all">
                        View Repositories
                    </a>
                    <a href="resume.pdf" class="border border-slate-300 dark:border-slate-700 px-8 py-4 rounded-xl font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        Download CV
                    </a>
                </div>
            </div>

        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
